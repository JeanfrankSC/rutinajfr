<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!-- Evita que el iPhone haga zoom al tocar los inputs -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Home Hypertrophy Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { 
            -webkit-tap-highlight-color: transparent; 
            background-color: #09090b; /* zinc-950 */
        }
        .pb-safe { padding-bottom: calc(1rem + env(safe-area-inset-bottom)); }
        
        /* Animaciones */
        @keyframes fadeInBottom {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInRight {
            from { opacity: 0; transform: translateX(10px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .animate-bottom { animation: fadeInBottom 0.3s ease-out forwards; }
        .animate-right { animation: fadeInRight 0.3s ease-out forwards; }
    </style>
</head>
<body class="text-zinc-100 font-sans antialiased selection:bg-orange-500/30">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ICONOS SVG ---
        const IconFlame = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-orange-500"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>;
        const IconCheck = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>;
        const IconTarget = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>;
        const IconAlert = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>;
        const IconChevron = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-zinc-600"><polyline points="9 18 15 12 9 6"/></svg>;
        const IconSave = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>;
        const IconHistoryBig = () => <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="mx-auto text-zinc-700 mb-4"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>;
        const IconDumbbell = ({ active }) => <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={active ? "2.5" : "2"} strokeLinecap="round" strokeLinejoin="round"><path d="m14.4 14.4 5.2-5.2"/><path d="M22.5 13.5 10.5 1.5"/><path d="m21.1 9.6-5.2-5.2"/><path d="m16.9 5.4-2.8-2.8"/><path d="M9.6 21.1 4.4 15.9"/><path d="m14.4 14.4-5.2-5.2"/><path d="M13.5 22.5 1.5 10.5"/><path d="m5.4 16.9-2.8-2.8"/></svg>;
        const IconCalendar = ({ active }) => <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={active ? "2.5" : "2"} strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>;

        // --- RUTINA ---
        const RUTINA_BASE = [
          {
            id: 'dia1',
            nombre: 'Día 1: Torso (Empuje pesado)',
            enfoque: 'Pecho, Hombro Lateral y Tríceps',
            ejercicios: [
              { id: 'e1', nombre: 'Press Inclinado (Banco a 30°)', series: 4, repeticiones: '8-12 (Controlado)' },
              { id: 'e2', nombre: 'Press Plano DB + Flexiones', series: 3, repeticiones: 'Superserie al fallo' },
              { id: 'e3', nombre: 'Elevaciones Laterales (Sentado)', series: 4, repeticiones: '12-15' },
              { id: 'e4', nombre: 'Extensión Tríceps Tras Nuca', series: 4, repeticiones: '10-12 (1 DB pesada)' }
            ]
          },
          {
            id: 'dia2',
            nombre: 'Día 2: Pierna (Foco Cuádriceps)',
            enfoque: 'Trabajo Unilateral (Exprimir los 20kg)',
            ejercicios: [
              { id: 'e5', nombre: 'Sentadilla Búlgara (Pie en banco)', series: 4, repeticiones: '8-12 /pierna' },
              { id: 'e6', nombre: 'Sentadilla Goblet (Talones elevados)', series: 3, repeticiones: '15 (Bajando en 3s)' },
              { id: 'e7', nombre: 'Elevación Pantorrillas', series: 4, repeticiones: '15-20 /pierna (A 1 pie)' },
              { id: 'e8', nombre: 'Crunches en Banco', series: 3, repeticiones: 'Al fallo' }
            ]
          },
          {
            id: 'dia3',
            nombre: 'Día 3: Torso (Tirón + Hombros)',
            enfoque: 'Espalda, Bíceps y Hombro Posterior',
            ejercicios: [
              { id: 'e9', nombre: 'Remo Apoyado en Banco Inclinado', series: 4, repeticiones: '10-12 (Pausa arriba)' },
              { id: 'e10', nombre: 'Pullover con DB en Banco', series: 3, repeticiones: '10-15 (Dorsales)' },
              { id: 'e11', nombre: 'Pájaros (Pecho en banco)', series: 4, repeticiones: '15-20' },
              { id: 'e12', nombre: 'Curl Bíceps Inclinado (Banco 45°)', series: 3, repeticiones: '10-12' },
              { id: 'e13', nombre: 'Elevaciones Laterales', series: 4, repeticiones: '15-20' }
            ]
          },
          {
            id: 'dia4',
            nombre: 'Día 4: Pierna (Cadena Posterior)',
            enfoque: 'Isquios y Glúteos',
            ejercicios: [
              { id: 'e14', nombre: 'Peso Muerto Rumano', series: 4, repeticiones: '12-15 (Bajada lenta con 20s)' },
              { id: 'e15', nombre: 'Hip Thrust a 1 pierna', series: 3, repeticiones: '10-12 /pierna (Espalda en banco)' },
              { id: 'e16', nombre: 'Zancadas estáticas', series: 3, repeticiones: '12 /pierna' },
              { id: 'e17', nombre: 'Plancha Abdominal', series: 3, repeticiones: 'Al fallo' }
            ]
          }
        ];

        // --- COMPONENTE PRINCIPAL ---
        function App() {
          const [tab, setTab] = useState('rutina');
          const [diaActivo, setDiaActivo] = useState(null);
          const [sesionActual, setSesionActual] = useState({});
          const [historial, setHistorial] = useState([]);
          const [mensaje, setMensaje] = useState('');

          useEffect(() => {
            try {
              const savedHistory = localStorage.getItem('aesthetic_home_history_v3');
              if (savedHistory) setHistorial(JSON.parse(savedHistory));
            } catch (e) {
              console.error('Error cargando historial', e);
            }
          }, []);

          const handleInput = (ejercicioId, setIndex, field, value) => {
            setSesionActual(prev => {
              const updated = { ...prev };
              if (!updated[ejercicioId]) updated[ejercicioId] = [];
              if (!updated[ejercicioId][setIndex]) updated[ejercicioId][setIndex] = { peso: '', reps: '' };
              updated[ejercicioId][setIndex][field] = value;
              return updated;
            });
          };

          const guardarSesion = () => {
            if (Object.keys(sesionActual).length === 0) {
              mostrarMensaje('Bro, no has anotado nada. Registra tus repeticiones.');
              return;
            }

            const nuevaSesion = {
              id: Date.now(),
              fecha: new Date().toLocaleDateString('es-PE', { weekday: 'short', month: 'short', day: 'numeric' }),
              diaNombre: diaActivo.nombre,
              datos: sesionActual
            };

            const nuevoHistorial = [nuevaSesion, ...historial];
            setHistorial(nuevoHistorial);
            localStorage.setItem('aesthetic_home_history_v3', JSON.stringify(nuevoHistorial));
            
            setSesionActual({});
            setDiaActivo(null);
            setTab('historial');
            mostrarMensaje('¡Sesión guardada! Ahora ve a comer tu proteína.');
          };

          const mostrarMensaje = (msg) => {
            setMensaje(msg);
            setTimeout(() => setMensaje(''), 3500);
          };

          return (
            <div className="min-h-screen pb-24">
              <header className="bg-zinc-900 p-5 sticky top-0 z-10 border-b border-zinc-800 shadow-md flex items-center justify-between">
                <div>
                  <h1 className="text-xl font-black tracking-tight text-white uppercase flex items-center gap-2">
                    <IconFlame />
                    Home Hypertrophy
                  </h1>
                  <p className="text-xs text-zinc-400 font-medium tracking-wider">BANCO + DB (MAX 20KG)</p>
                </div>
              </header>

              {mensaje && (
                <div className="fixed top-24 left-1/2 transform -translate-x-1/2 bg-orange-600 text-white px-5 py-3 rounded-xl shadow-2xl z-50 flex items-center gap-3 text-sm font-bold w-11/12 max-w-sm border border-orange-500/50">
                  <IconCheck />
                  {mensaje}
                </div>
              )}

              <main className="p-4 max-w-md mx-auto">
                {tab === 'rutina' && !diaActivo && (
                  <div className="space-y-4 animate-bottom">
                    <div className="bg-red-950/30 border border-red-500/20 p-4 rounded-2xl mb-6">
                      <h3 className="text-red-400 font-bold flex items-center gap-2 mb-2 text-sm">
                        <IconAlert />
                        Regla de Oro (Falta de Peso)
                      </h3>
                      <p className="text-xs text-zinc-300 leading-relaxed">
                        Como tu máximo son mancuernas de 20kg, si logras hacer más de 15 reps en un ejercicio, <span className="font-bold text-white">debes hacer la bajada más lenta (3 a 4 segundos)</span> para seguir estimulando la hipertrofia sin necesidad de más kilos.
                      </p>
                    </div>

                    {RUTINA_BASE.map((dia) => (
                      <button
                        key={dia.id}
                        onClick={() => setDiaActivo(dia)}
                        className="w-full bg-zinc-900/80 p-5 rounded-2xl flex items-center justify-between hover:bg-zinc-800 transition-all active:scale-[0.98] border border-zinc-800 shadow-sm"
                      >
                        <div className="text-left">
                          <h3 className="text-lg font-bold text-orange-400">{dia.nombre}</h3>
                          <p className="text-sm text-zinc-500 mt-1 font-medium">{dia.enfoque}</p>
                        </div>
                        <IconChevron />
                      </button>
                    ))}
                  </div>
                )}

                {tab === 'rutina' && diaActivo && (
                  <div className="space-y-6 animate-right">
                    <div className="flex items-center gap-3 mb-2 sticky top-[72px] bg-[#09090b]/90 backdrop-blur py-2 z-10 border-b border-zinc-900/50">
                      <button 
                        onClick={() => setDiaActivo(null)}
                        className="text-zinc-400 p-2 bg-zinc-900 rounded-full hover:bg-zinc-800 transition-colors"
                      >
                        ←
                      </button>
                      <h2 className="text-lg font-bold flex-1">{diaActivo.nombre}</h2>
                    </div>

                    {diaActivo.ejercicios.map((ejercicio) => (
                      <div key={ejercicio.id} className="bg-zinc-900 rounded-2xl p-5 border border-zinc-800/80 shadow-sm">
                        <div className="flex flex-col mb-4 gap-2">
                          <h3 className="font-bold text-base text-zinc-100">{ejercicio.nombre}</h3>
                          <span className="text-[10px] text-orange-400 uppercase tracking-widest font-black bg-orange-500/10 px-2 py-1 rounded inline-block w-fit">
                            {ejercicio.series} SERIES | {ejercicio.repeticiones}
                          </span>
                        </div>
                        
                        <div className="space-y-3">
                          <div className="grid grid-cols-12 gap-2 text-[10px] text-zinc-500 font-bold px-1 uppercase tracking-wider">
                            <div className="col-span-2 text-center">Set</div>
                            <div className="col-span-5 text-center">Peso (Kg)</div>
                            <div className="col-span-5 text-center">Reps</div>
                          </div>
                          
                          {[...Array(ejercicio.series)].map((_, index) => (
                            <div key={index} className="grid grid-cols-12 gap-2 items-center">
                              <div className="col-span-2 text-center font-bold text-zinc-600">{index + 1}</div>
                              <div className="col-span-5">
                                <select
                                  className="w-full bg-[#09090b] text-white p-2.5 rounded-xl text-center border border-zinc-800 focus:border-orange-500 outline-none transition-all font-semibold appearance-none"
                                  value={sesionActual[ejercicio.id]?.[index]?.peso || ''}
                                  onChange={(e) => handleInput(ejercicio.id, index, 'peso', e.target.value)}
                                >
                                  <option value="">- Kg -</option>
                                  <option value="10">10 kg</option>
                                  <option value="15">15 kg</option>
                                  <option value="20">20 kg</option>
                                  <option value="bw">Corp. / Sin peso</option>
                                </select>
                              </div>
                              <div className="col-span-5">
                                <input
                                  type="number"
                                  inputMode="numeric"
                                  placeholder="Reps"
                                  className="w-full bg-[#09090b] text-white p-2.5 rounded-xl text-center border border-zinc-800 focus:border-orange-500 focus:ring-1 focus:ring-orange-500 outline-none transition-all font-semibold placeholder:text-zinc-700"
                                  value={sesionActual[ejercicio.id]?.[index]?.reps || ''}
                                  onChange={(e) => handleInput(ejercicio.id, index, 'reps', e.target.value)}
                                />
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    ))}

                    <button
                      onClick={guardarSesion}
                      className="w-full bg-orange-600 text-white font-black py-4 rounded-2xl flex items-center justify-center gap-2 hover:bg-orange-500 shadow-[0_0_20px_rgba(234,88,12,0.15)] mt-8 active:scale-95 transition-all uppercase tracking-wider text-sm"
                    >
                      <IconSave />
                      Terminar y Guardar
                    </button>
                  </div>
                )}

                {tab === 'historial' && (
                  <div className="space-y-4 animate-bottom">
                    {historial.length === 0 ? (
                      <div className="text-center py-16 px-4 bg-zinc-900/50 rounded-3xl border border-zinc-800/50 border-dashed">
                        <IconHistoryBig />
                        <h3 className="text-lg font-bold text-zinc-300 mb-1">Cero entrenamientos</h3>
                        <p className="text-sm text-zinc-500">Registra tu progreso para asegurar sobrecarga progresiva.</p>
                      </div>
                    ) : (
                      historial.map((sesion) => (
                        <div key={sesion.id} className="bg-zinc-900 p-5 rounded-2xl border border-zinc-800 shadow-sm relative overflow-hidden">
                          <div className="absolute top-0 left-0 w-1 h-full bg-orange-500"></div>
                          <div className="flex justify-between items-center mb-4">
                            <h3 className="font-bold text-zinc-100">{sesion.diaNombre}</h3>
                            <span className="text-[10px] font-black tracking-widest text-zinc-400 uppercase">{sesion.fecha}</span>
                          </div>
                          <div className="space-y-2">
                            {Object.keys(sesion.datos).map(ejId => {
                              let nombreEj = 'Ejercicio';
                              RUTINA_BASE.forEach(dia => {
                                const ej = dia.ejercicios.find(e => e.id === ejId);
                                if (ej) nombreEj = ej.nombre;
                              });
                              const setsCompletados = sesion.datos[ejId].filter(s => s.peso || s.reps).length;
                              if (setsCompletados === 0) return null;

                              return (
                                <div key={ejId} className="flex justify-between text-xs items-center bg-[#09090b] p-2.5 rounded-lg border border-zinc-800/50">
                                  <span className="text-zinc-300 font-medium truncate pr-3">{nombreEj}</span>
                                  <span className="text-orange-400 font-bold whitespace-nowrap">
                                    {setsCompletados} series
                                  </span>
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      ))
                    )}
                  </div>
                )}
              </main>

              <nav className="fixed bottom-0 w-full bg-[#09090b]/90 backdrop-blur-md border-t border-zinc-800 flex justify-around p-2 pb-safe z-10">
                <button
                  onClick={() => setTab('rutina')}
                  className={`flex flex-col items-center gap-1 w-1/2 p-2 rounded-xl transition-all ${tab === 'rutina' ? 'text-orange-500' : 'text-zinc-500 hover:text-zinc-300'}`}
                >
                  <IconDumbbell active={tab === 'rutina'} />
                  <span className="text-[9px] font-black uppercase tracking-widest mt-1">Entrenar</span>
                </button>
                <button
                  onClick={() => setTab('historial')}
                  className={`flex flex-col items-center gap-1 w-1/2 p-2 rounded-xl transition-all ${tab === 'historial' ? 'text-orange-500' : 'text-zinc-500 hover:text-zinc-300'}`}
                >
                  <IconCalendar active={tab === 'historial'} />
                  <span className="text-[9px] font-black uppercase tracking-widest mt-1">Registros</span>
                </button>
              </nav>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
